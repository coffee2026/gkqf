        * {

            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #831a1a 0%, #5a0f0f 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .cloud-svg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        .cloud-svg svg { width: 100%; height: 100%; }
        .cloud-tl { top: 10px; left: 10px; width: 130px; height: 90px; }
        .cloud-tr { top: 10px; right: 10px; width: 130px; height: 90px; }
        .cloud-bl { bottom: 10px; left: 10px; width: 150px; height: 100px; }
        .cloud-br { bottom: 10px; right: 10px; width: 150px; height: 100px; }

        .container {
            max-width: 620px;
            margin: 0 auto;
            background: rgba(75, 20, 20, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 72px;
            padding: 28px 22px 36px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 215, 0, 0.4);
            border: 1px solid #ffd966;
            position: relative;
            z-index: 10;
        }

        .title-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .main-title {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff5cc, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px #9b2e2e;
            letter-spacing: 4px;
        }
        .sub-line {
            font-size: 1rem;
            color: #ffefb0;
            background: #3a1010aa;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            margin-top: 10px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .muyu-area {
            text-align: center;
            margin: 16px 0 12px;
        }
        .muyu {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.08s linear;
            filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.4));
        }
        .muyu:active {
            transform: scale(0.94);
        }
        .muyu-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            background: #fff8e7;
            box-shadow: inset 0 0 0 4px #f3c26b, 0 12px 24px rgba(0,0,0,0.3);
        }
        .info {
            color: #fff0b5;
            font-weight: bold;
            margin-top: 14px;
            font-size: 1.3rem;
            background: #2c0606b3;
            display: inline-block;
            padding: 6px 26px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .subject-panel {
            background: rgba(55, 18, 18, 0.88);
            border-radius: 48px;
            padding: 20px 16px;
            margin: 24px 0;
            border: 1px solid #efbc6e;
        }
        .subject-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 18px;
        }
        .subject-btn {
            background: #712020;
            color: #fff0cf;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .subject-btn.active {
            background: #f3c26b;
            color: #2d0505;
            box-shadow: 0 0 8px #ffd966;
        }
        .small-note {
            text-align: center;
            color: #ffe3a3;
            font-size: 0.7rem;
            margin: 6px 0 12px;
        }
        .advice-card {
            background: #2c0c0cee;
            padding: 16px 18px;
            border-radius: 38px;
            color: #fff2db;
            font-size: 0.9rem;
            line-height: 1.45;
            border-left: 6px solid #f3c26b;
        }

        .share-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5cd6b, #e7a831);
            color: #2d0505;
            font-weight: 800;
            padding: 14px;
            border-radius: 60px;
            border: none;
            margin: 18px 0 14px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.1s;
            box-shadow: 0 6px 0 #8a521a;
        }
        .share-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8a521a;
        }

        .coze-section {
            background: rgba(35, 9, 9, 0.92);
            border-radius: 48px;
            padding: 20px 14px;
            margin: 24px 0;
            border: 1px solid #efbc6e;
        }
        .coze-title {
            color: #ffea9e;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .coze-iframe {
            width: 100%;
            height: 540px;
            border: none;
            border-radius: 32px;
            background: #1f0c0c;
        }

        .collection-section {
            background: rgba(110, 35, 35, 0.94);
            border-radius: 52px;
            padding: 22px 18px;
            margin: 24px 0 16px;
            border: 1px solid #ffd966;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            color: #ffe2a4;
        }
        .collection-title {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .collection-progress {
            font-size: 0.8rem;
            background: #2a0808;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 14px;
            margin-top: 8px;
        }
        .university-card {
            background: #922a2a;
            color: #fff2da;
            text-align: center;
            padding: 12px 6px;
            border-radius: 32px;
            font-size: 0.75rem;
            border: 1px solid #f3c26b;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .university-card:active {
            transform: scale(0.96);
            background: #c13b3b;
        }
        .uni-emoji {
            font-size: 1.7rem;
            margin-bottom: 6px;
        }
        .uni-name {
            font-size: 0.8rem;
            font-weight: bold;
        }
        .unlock-badge {
            font-size: 0.65rem;
            background: #f3c26b;
            color: #3d0b0b;
            border-radius: 20px;
            padding: 2px 8px;
            display: inline-block;
            margin-top: 6px;
        }

        .payment-area {
            text-align: center;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px dashed #ffd966;
        }
        .payment-link {
            display: inline-block;
            background: #d4af37;
            color: #2d0505;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.95rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: 0.1s;
            cursor: pointer;
        }
        .payment-link:active {
            transform: scale(0.96);
        }
        .qr-wrapper {
            margin-top: 20px;
            display: none;
            justify-content: center;
        }
        .copy-card {
            background: white;
            padding: 20px;
            border-radius: 32px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 280px;
        }
        .copy-wechat-large {
            background: #2c5e2e;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
            display: inline-block;
            margin: 15px 0;
            border: none;
            width: 100%;
        }
        .copy-wechat-large:active {
            transform: scale(0.96);
            background: #1f4521;
        }
        .copy-card p {
            font-size: 0.9rem;
            color: #2d0505;
            margin: 10px 0;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(109,22,22,0.96);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: linear-gradient(145deg, #fff2df, #ffe0b5);
            border-radius: 56px;
            max-width: 340px;
            width: 80%;
            padding: 28px 20px;
            text-align: center;
            border: 3px solid #e7b45a;
            color: #3d0c0c;
        }
        .modal-close {
            background: #d9a23b;
            border: none;
            margin-top: 22px;
            padding: 8px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .floating-text {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.4rem;
            color: #ffec80;
            text-shadow: 0 0 8px #ff6600;
            z-index: 999;
            animation: floatUp 0.9s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(0.9);}
            100% { opacity: 0; transform: translateY(-110px) scale(1.2);}
        }

        @media (max-width: 550px) {
            .muyu { width: 160px; height: 160px; }
            .main-title { font-size: 1.8rem; }
            .coze-iframe { height: 460px; }
            .map-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
            .uni-emoji { font-size: 1.4rem; }
        }
    </style>

        let unlockedIds = [];
        let reachedMilestones = new Set();

        function renderUnlockedCards() {
            const grid = document.getElementById("unlockedGrid");
            grid.innerHTML = "";
            if (unlockedIds.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#ffda88; padding:24px;">✨ 轻敲木鱼，积攒功德，名校福缘自会降临 ✨</div>';
                document.getElementById("collectionProgress").innerText = `已解锁 0 / ${allUniversities.length}`;
                return;
            }
            for (let idx of unlockedIds) {
                const uni = allUniversities[idx];
                const card = document.createElement("div");
                card.className = "university-card";
                card.innerHTML = `<div class="uni-emoji">${uni.emoji}</div><div class="uni-name">${uni.name}</div><div class="unlock-badge">🏅 福缘</div>`;
                card.onclick = () => {
                    const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
                    modalDiv.innerHTML = `<div class="modal-card"><div style="font-size:2.8rem;">${uni.emoji}</div><div style="font-size:1.4rem;font-weight:bold;">✨ ${uni.name} ✨</div><div>🏛️ ${uni.loc}</div><div style="margin:10px 0;">“${uni.slogan}”</div><div><strong>🏆 ${uni.info}</strong></div><div><strong>知名校友：</strong>${uni.famous}</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">🙏 纳福祈愿</button></div>`;
                    document.body.appendChild(modalDiv);
                };
                grid.appendChild(card);
            }
            document.getElementById("collectionProgress").innerText = `已解锁 ${unlockedIds.length} / ${allUniversities.length}`;
        }

        function tryUnlockNewCard(currentCount) {
            for (let m of milestones) {
                if (currentCount >= m && !reachedMilestones.has(m)) {
                    reachedMilestones.add(m);
                    const remaining = Array.from({length: allUniversities.length}, (_,i) => i).filter(i => !unlockedIds.includes(i));
                    if (remaining.length > 0) {
                        const randomIndex = remaining[Math.floor(Math.random() * remaining.length)];
                        unlockedIds.push(randomIndex);
                        renderUnlockedCards();
                        const newUni = allUniversities[randomIndex];
                        const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
                        modalDiv.innerHTML = `<div class="modal-card"><div style="font-size:3rem;">${newUni.emoji}</div><div style="font-size:1.5rem;font-weight:bold;">🎉 恭喜解锁名校福缘 🎉</div><div style="font-size:1.2rem;margin:8px 0;">✨ ${newUni.name} ✨</div><div>🏛️ ${newUni.loc}</div><div style="margin:12px 0;">功德已达 ${currentCount}，名校福缘护体！</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">🙏 收下福气</button></div>`;
                        document.body.appendChild(modalDiv);
                    } else if(unlockedIds.length === allUniversities.length && !window.allUnlockedNotified){
                        window.allUnlockedNotified = true;
                        const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
                        modalDiv.innerHTML = `<div class="modal-card"><div style="font-size:2rem;">🏆🏆🏆</div><div style="font-weight:bold;">功德圆满！所有名校福缘已集齐！</div><div>金榜题名，前程似锦！</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">🙏 感恩</button></div>`;
                        document.body.appendChild(modalDiv);
                    }
                    break;
                }
            }
        }

        const muyuDiv = document.getElementById("muyuBtn");
        function onKnock(e) {
            totalKnock++;
            totalSpan.innerText = totalKnock;
            switchAvatar();
            if(knockAudio) { knockAudio.currentTime = 0; knockAudio.play().catch(()=>{}); } 
            else { knockAudio = createKnockAudio(); if(knockAudio){ knockAudio.currentTime=0; knockAudio.play().catch(()=>{});} }
            let clientX, clientY;
            if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } 
            else { clientX = e.clientX; clientY = e.clientY; }
            if(!clientX || !clientY) { const rect = muyuDiv.getBoundingClientRect(); clientX = rect.left + rect.width/2; clientY = rect.top + rect.height/2; }
            showFloatingText(clientX, clientY);
            if(navigator.vibrate) navigator.vibrate(20);
            tryUnlockNewCard(totalKnock);
        }
        muyuDiv.addEventListener("click", onKnock);
        muyuDiv.addEventListener("touchstart", (e) => { e.preventDefault(); onKnock(e); }, { passive: false });

        const subjectTips = {

            "数学": ["🧮 选填前8题必拿，后4题用排除。","📐 大题分步写，公式对就给分。","📓 错题只记「卡壳点」，不抄整题。","⚡ 解析几何/数列二级结论记熟。","📈 函数先定义域，再讨论单调性。","🎲 概率分布列、期望别算错。","📦 立体几何建系，法向量算对。","⏱️ 限时选填40分钟，大题70分钟。"],

            "历史": ["📅 中外时间轴对照。","📝 小论文：观点+史实+总结。","❌ 排除「绝对词」。","🔍 材料找关键词+课本。","📚 政/经/文化三维。","🏮 高频考点：洋务运动/启蒙运动。","🧠 史观素养：唯物史观。","🗺️ 地图题注意疆域变迁。"]

        function renderSubjects() {
            const container = document.getElementById("subjectBtns");
            container.innerHTML = "";
            subjects.forEach(s => {
                const btn = document.createElement("button");
                btn.className = "subject-btn" + (s === currentSubject ? " active" : "");
                let icon = s === "语文" ? "📖" : s === "数学" ? "📐" : s === "英语" ? "🇬🇧" : s === "物理" ? "⚛️" : s === "化学" ? "🧪" : s === "生物" ? "🧬" : "📜";
                btn.innerHTML = `${icon} ${s}`;
                btn.onclick = () => {
                    document.querySelectorAll(".subject-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentSubject = s;
                    updateAdvice(currentSubject);
                };
                container.appendChild(btn);
            });
        }
        function updateAdvice(subj) {
            const arr = subjectTips[subj];
            const randomTip = arr[Math.floor(Math.random() * arr.length)];

            document.getElementById("adviceTitle").innerHTML = `${titleMap[subj] || "📚"} ${subj} · 提分锦囊`;
        }

            const url = window.location.href;
            if(url.startsWith('file://')) alert("本地预览，请部署至服务器后分享。");

        });

        const payBtn = document.getElementById("payBtn");
        const qrContainer = document.getElementById("qrContainer");
        payBtn.addEventListener("click", (e) => {
            e.preventDefault();
            if (qrContainer.style.display === "none" || getComputedStyle(qrContainer).display === "none") {
                qrContainer.style.display = "flex";
            } else {
                qrContainer.style.display = "none";
            }
        });

            }).catch(() => {
                alert("请手动复制微信号：yiminvisa");
            });

        let loaded = false;
        if (cozeFrame) {
            cozeFrame.onload = function() {
                loaded = true;
                if (fallbackDiv) fallbackDiv.style.display = 'none';
            };
            setTimeout(function() {
                if (!loaded && fallbackDiv) {

        const warmAudio = () => {
            if(knockAudio){ knockAudio.volume=0.01; knockAudio.play().then(()=>{ knockAudio.pause(); knockAudio.currentTime=0; knockAudio.volume=0.6; }).catch(()=>{}); }
            document.removeEventListener('click', warmAudio);
            document.removeEventListener('touchstart', warmAudio);
        };
        document.addEventListener('click', warmAudio, { once: true });
        document.addEventListener('touchstart', warmAudio, { once: true });
