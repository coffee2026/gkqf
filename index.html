<html lang="zh-CN">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #831a 0%, #5a0f0f 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .cloud-svg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        .cloud-svg svg { width: 100%; height: 100%; }
        .cloud-tl { top: 10px; left: 10px; width: 130px; height: 90px; }
        .cloud-tr { top: 10px; right: 10px; width: 130px; height: 90px; }
        .cloud-bl { bottom: 10px; left: 10px; width: 150px; height: 100px; }
        .cloud-br { bottom: 10px; right: 10px; width: 150px; height: 100px; }
        .container {
            max-width: 620px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        /* 木鱼区域 */
        .muyu-wrap {
            background: rgba(75, 20, 20, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 72px;
            padding: 28px 22px 36px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 215, 0, 0.4);
            border: 1px solid #ffd966;
            margin-bottom: 24px;
        }
        .title-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .main-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff5cc, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px #9b2e2e;
            letter-spacing: 2px;
        }
        .main-title .muyu-word {
            font-size: 1.7rem;
            display: inline-block;
        }
        .sub-line {
            font-size: 1rem;
            color: #ffefb0;
            background: #3a1010aa;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            margin-top: 10px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .muyu-area {
            text-align: center;
            margin: 16px 0 12px;
        }
        .muyu {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.08s linear;
            filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.4));
        }
        .muyu:active { transform: scale(0.94); }
        .muyu-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            background: #fff8e7;
            box-shadow: inset 0 0 0 4px #f3c26b, 0 12px 24px rgba(0,0,0,0.3);
        }
        .info {
            color: #fff0b5;
            font-weight: bold;
            margin-top: 14px;
            font-size: 1.1rem;
            background: #2c0606b3;
            display: inline-block;
            padding: 6px 26px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        /* 学科锦囊 */
        .subject-panel {
            background: rgba(55, 18, 18, 0.88);
            border-radius: 48px;
            padding: 20px 16px;
            margin: 24px 0;
            border: 1px solid #efbc6e;
        }
        .subject-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 18px;
        }
        .subject-btn {
            background: #712020;
            color: #fff0cf;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .subject-btn.active {
            background: #f3c26b;
            color: #2d0505;
            box-shadow: 0 0 8px #ffd966;
        }
        .small-note {
            text-align: center;
            color: #ffe3a3;
            font-size: 0.7rem;
            margin: 6px 0 12px;
        }
        .advice-card {
            background: #2c0c0cee;
            padding: 16px 18px;
            border-radius: 38px;
            color: #fff2db;
            font-size: 0.9rem;
            line-height: 1.45;
            border-left: 6px solid #f3c26b;
            min-height: 120px;
        }
        /* 分享按钮 */
        .share-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5cd6b, #e7a831);
            color: #2d0505;
            font-weight: 800;
            padding: 14px;
            border-radius: 60px;
            border: none;
            margin: 18px 0 28px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.1s;
            box-shadow: 0 6px 0 #8a521a;
        }
        .share-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a521a; }
        /* ====================== AI 升学顾问（默认第一眼看到） ====================== */
        .coze-section {
            background: rgba(35, 9, 9, 0.92);
            border-radius: 48px;
            padding: 20px 14px;
            margin-bottom: 28px;
            border: 1px solid #efbc6e;
            scroll-margin-top: 20px;
        }
        .coze-title {
            color: #ffea9e;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .coze-container {
            width: 100%;
            height: 480px;
            border-radius: 32px;
            overflow: hidden;
            border: 2px solid #f3c26b;
            margin: 0 auto;
        }
        .coze-iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(0.85); /* 缩小到0.85，适配手机端显示完整界面 */
            transform-origin: top center; /* 调整缩放原点为顶部居中，确保关闭按钮可见 */
        }
        /* 名校卡 */
        .collection-section {
            background: rgba(110, 35, 35, 0.94);
            border-radius: 52px;
            padding: 22px 18px;
            margin: 24px 0 16px;
            border: 1px solid #ffd966;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            color: #ffe2a4;
        }
        .collection-title { font-weight: bold; font-size: 1.1rem; }
        .collection-progress {
            font-size: 0.8rem;
            background: #2a0808;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 14px;
            margin-top: 8px;
        }
        .university-card {
            background: #922a2a;
            color: #fff2da;
            text-align: center;
            padding: 12px 6px;
            border-radius: 32px;
            font-size: 0.75rem;
            border: 1px solid #f3c26b;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .university-card:active { transform: scale(0.96); background: #c13b3b; }
        .uni-emoji { font-size: 1.7rem; margin-bottom: 6px; }
        .uni-name { font-size: 0.8rem; font-weight: bold; }
        .unlock-badge {
            font-size: 0.65rem;
            background: #f3c26b;
            color: #3d0b0b;
            border-radius: 20px;
            padding: 2px 8px;
            display: inline-block;
            margin-top: 6px;
        }
        /* 赞赏码 */
        .payment-area {
            text-align: center;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px dashed #ffd966;
        }
        .payment-link {
            display: inline-block;
            background: #d4af37;
            color: #2d0505;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.95rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: 0.1s;
            cursor: pointer;
        }
        .payment-link:active { transform: scale(0.96); }
        .qr-wrapper {
            margin-top: 20px;
            display: none;
            justify-content: center;
        }
        .qr-card {
            background: white;
            padding: 12px;
            border-radius: 32px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .qr-card img {
            width: 100%;
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 20px;
        }
        .qr-text {
            font-size: 0.85rem;
            color: #fff;
            text-shadow: 0 0 3px #ff69b4,0 0 3px #ff69b4,0 0 3px #ff69b4;
            margin-top: 12px;
            line-height: 1.5;
            text-align: center;
        }
        .copy-wechat {
            display: inline-block;
            background: #2c5e2e;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.1s;
        }
        .copy-wechat:active { transform: scale(0.96); background: #1f4521; }
        /* 浮动文字 */
        .floating-text {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.4rem;
            color: #ffec80;
            text-shadow: 0 0 4px #ff0000,0 0 4px #ff0000,0 0 4px #ff0000;
            z-index: 999;
            animation: floatUp 0.9s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(0.9);}
            100% { opacity: 0; transform: translateY(-110px) scale(1.2);}
        }
        .unlock-toast {
            position: fixed;
            left: 50%;
            top: 40%;
            transform: translate(-50%,-50%);
            background: linear-gradient(135deg, #ffdf70, #ffc107);
            color: #8B0000;
            font-weight: bold;
            font-size: 1rem;
            padding: 20px 28px;
            border-radius: 16px;
            z-index: 9999;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 2px solid #fff;
            opacity: 1;
        }
        .unlock-toast .blessing-text {
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
            color: #8B0000;
            display: block;
        }
        .unlock-toast .receive-btn {
            background: #8B0000;
            color: #ffdf70;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .audio-tip {
            text-align: center;
            color: #ffd966;
            font-size: 0.8rem;
            margin: 8px 0;
            display: none;
        }
        @media (max-width: 580px) {
            .coze-container { 
                height: 600px;
                margin: 0 auto;
                overflow: visible;
            }
            .coze-iframe {
                transform: scale(1.0);
                transform-origin: top center;
            }
            .muyu { width: 160px; height: 160px; }
            .main-title { font-size: 1.6rem; }
            .map-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
            .qr-card img { max-width: 160px; }
        }
    </style>
</head>

    <div class="cloud-svg cloud-tl"><svg viewBox="0 0 130 90" fill="none" stroke="white" stroke-width="1.5"><path d="M20,40 Q32,24 48,30 Q60,18 75,28 Q90,22 102,36 Q112,46 106,58 Q94,68 78,62 Q62,74 46,64 Q30,72 20,56 Q10,48 20,40Z" fill="rgba(255,255,255,0.13)" /></svg></div>

    <div class="cloud-svg cloud-bl"><svg viewBox="0 0 150 100" fill="none" stroke="white" stroke-width="1.5"><path d="M25,45 Q35,28 52,35 Q68,22 85,32 Q105,25 118,40 Q128,52 120,66 Q106,80 88,72 Q70,84 52,74 Q32,82 22,64 Q12,56 25,45Z" fill="rgba(255,255,255,0.12)" /></svg></div>

    <script>
        // 页面加载自动滚动到AI
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                document.getElementById('aiAdvisor').scrollInto({ behavior: 'smooth', block: 'start' });
            }, 300);
        });

        // 木鱼
        const AVATAR_LIST = [
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='94' fill='%23f9e0a0' stroke='%23d4af37' stroke-width='4'/%3E%3Ccircle cx='100' cy='100' r='88' fill='%23ffb347'/%3E%3Cellipse cx='100' cy='100' rx='50' ry='38' fill='%23b23c1c'/%3E%3Ccircle cx='78' cy='92' r='6' fill='white'/%3E%3Ccircle cx='80' cy='94' r='3' fill='black'/%3E%3Ccircle cx='122' cy='92' r='6' fill='white'/%3E%3Ccircle cx='120' cy='94' r='3' fill='black'/%3E%3Cpath d='M85 115 Q100 125 115 115' stroke='%238b0000' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Cpath d='M68 62 L132 62 L126 50 L74 50 Z' fill='%23e6b422' stroke='%23b8860b' stroke-width='3'/%3E%3Crect x='86' y='42' width='28' height='10' rx='3' fill='%23ffd700' stroke='%23b8860b' stroke-width='2'/%3E%3Ctext x='100' y='144' font-size='20' font-family='KaiTi, serif' fill='%23fff5cc' text-anchor='middle' font-weight='bold'%3E金榜题名%3C/text%3E%3C/svg%3E"
        ];
        let currentAvatarIndex = 0;
        const headImg = document.getElementById("headImg");
        headImg.src = AVATAR_LIST[currentAvatarIndex];
        function switchAvatar() {
            currentAvatarIndex = (currentAvatarIndex + 1) % AVATAR_LIST.length;
            headImg.src = AVATAR_LIST[currentAvatarIndex];
        }

        let knockAudio = null;
        let totalKnock = 0;
        const totalSpan = document.getElementById("total");
        const audioTip = document.getElementById("audioTip");

        function initAudio() {
            const url = "https://freetestdata.com/wp-content/uploads/2021/09/Free_Test_Data_100KB_MP3.mp3";
            knockAudio = new Audio(url);
            knockAudio.volume = 1.0;
            knockAudio.preload = "auto";
            knockAudio.addEventListener('canplaythrough', () => { audioTip.style.display = "none"; });
            knockAudio.addEventListener('error', () => { audioTip.textContent = "❌ 音效加载失败"; audioTip.style.color = "#ff6666"; });
            document.addEventListener('click', () => { if (knockAudio) knockAudio.play().then(()=>knockAudio.pause()); }, { once: true });
        }

        function playSound() {
            if (!knockAudio) return;
            const s = knockAudio.cloneNode();
            s.volume = 1.0;
            s.play();
        }

        document.getElementById("muyuBtn").addEventListener('click', (e) => {
            totalKnock++;
            totalSpan.textContent = totalKnock;
            playSound();
            switchAvatar();
            const rect = e.target.getBoundingClientRect();
            showFloat(rect.left+rect.width/2, rect.top+rect.height/2);
            if(totalKnock === 1 || totalKnock % 5 === 0) unlockRandom();
        });

        const words = ["🎓 金榜题名","📚 逢考必过","✨ 旗开得胜","🐟 鱼跃龙门","🏆 状元及第","🌟 前程似锦"];
        function showFloat(x,y) {
            const el = document.createElement("div");
            el.className = "floating-text";
            el.innerText = words[Math.floor(Math.random()*words.length)];
            el.style.left = x-35+"px";
            el.style.top = y-45+"px";
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),900);
        }

        // 学科锦囊（5条/科）
        const subjectAdvice = {
            "语文": ["愿文曲星护佑，笔下生花～\n1.作文首尾用金句",

                     "愿文曲星护佑，笔下生花～\n4.文言文字字落实",
                     "愿文曲星护佑，笔下生花～\n5.真题熟悉套路"],
            "数学": ["愿数理星君加持～\n1.选填用特殊值法",
                     "愿数理星君加持～\n2.大题步骤写完整",
                     "愿数理星君加持～\n3.检查计算和单位",
                     "愿数理星君加持～\n4.函数画图辅助",
                     "愿数理星君加持～\n5.压轴分步拿分"],
            "英语": ["愿语言之神相助～\n1.作文换高级词",
                     "愿语言之神相助～\n2.听力圈关键词",
                     "愿语言之神相助～\n3.阅读找同义替换",
                     "愿语言之神相助～\n4.完形先通读",

        let unlockedUniversities = [];
        const unlockedGrid = document.getElementById("unlockedGrid");
        const collectionProgress = document.getElementById("collectionProgress");

        function unlockRandom() {
            if (unlockedUniversities.length >= allUniversities.length) return;
            let idx;
            do {
                idx = Math.floor(Math.random() * allUniversities.length);
            } while (unlockedUniversities.includes(idx));
            unlockedUniversities.push(idx);
            showUnlockToast(allUniversities[idx]);
            updateUniversityGrid();
        }

        function updateUniversityGrid() {
            collectionProgress.textContent = `已解锁 ${unlockedUniversities.length} / 108`;
            unlockedGrid.innerHTML = "";
            unlockedUniversities.forEach(idx => {
                const uni = allUniversities[idx];
                const card = document.createElement("div");
                card.className = "university-card";
                card.innerHTML = `
                    <div class="uni-emoji">${uni.emoji}</div>
                    <div class="uni-name">${uni.name}</div>
                    <div class="unlock-badge">${uni.info}</div>
                `;
                unlockedGrid.appendChild(card);
            });
        }

        function showUnlockToast(uni) {
            const existing = document.querySelector('.unlock-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'unlock-toast';
            toast.innerHTML = `
                <div style="font-size:1.5rem;margin-bottom:10px;">${uni.emoji}</div>
                <div>恭喜解锁名校</div>
                <div style="font-size:1.2rem;margin:6px 0;font-weight:bold;">${uni.name}｜${uni.loc}</div>
                <span class="blessing-text">🙏名校福缘护体</span>
                <button class="receive-btn">🙏收下福气</button>
            `;
            toast.querySelector('.receive-btn').addEventListener('click', () => toast.remove());
            document.body.appendChild(toast);
        }

        // 分享按钮（彻底修复+朋友圈文案）
        const shareBtn = document.getElementById("shareBtn");

        function generateShareText() {
            const randomUni = allUniversities[Math.floor(Math.random() * allUniversities.length)].name;
            const knockNum = totalKnock > 0 ? totalKnock : Math.floor(Math.random() * 108 + 1);
            const templates = [
                "敲木鱼祈福减压，我今天敲了{knock}下，解锁了{uni}名校福卡✨！快来一起祈福，愿金榜题名、逢考必过～",
                "🎓 考生静心祈福｜我敲了{knock}下，解锁{uni}名校福卡，愿所有考生下笔有神、前程似锦～",
                "🙏 高考祈福｜敲{knock}下木鱼，解锁{uni}名校福卡，祝学子旗开得胜、金榜题名！"
            ];
            const t = templates[Math.floor(Math.random() * templates.length)];
            return t.replace("{knock}", knockNum).replace("{uni}", randomUni);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
            } else {
                const t = document.createElement('textarea');
                t.value = text;
                t.style.position = 'fixed';
                t.style.left = '-9999px';
                t.style.top = '-9999px';
                document.body.appendChild(t);
                t.focus();
                t.select();
                let ok = false;
                try { ok = document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(t);
                return ok;
            }
        }

        shareBtn.addEventListener('click', async () => {
            const text = generateShareText();
            const url = window.location.href;
            const full = text + "\n\n" + url;

            const ok = await copyToClipboard(full);
            if (ok) {
                alert("✅ 分享文案已复制！\n\n" + full);
            } else {
                alert("📋 请手动复制：\n\n" + full);
            }

            if (navigator.share) {
                try {
                    await navigator.share({ title: "考生祈福木鱼", text: text, url: url });
                } catch (e) {}
            }
        });

        // 赞赏码
        const payBtn = document.getElementById("payBtn");
        const qrContainer = document.getElementById("qrContainer");
        payBtn.addEventListener('click', () => {
            qrContainer.style.display = qrContainer.style.display === "flex" ? "none" : "flex";
        });

            navigator.clipboard.writeText('yiminvisa').then(() => alert("已复制微信"));
        });

        initAudio();
        updateUniversityGrid();
    </script>
